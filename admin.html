<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Tracker Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#00C46A;--red:#FF3B3B;--blue:#2B7FFF;
    --bg:#0A0D12;--surface:#12161E;--surface2:#1C2230;
    --border:rgba(255,255,255,0.07);--text:#F0F2F7;--muted:#6B7280;--accent:#F5C518;
    --purple:#B06AFF;--orange:#FF8C00;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding:16px;}
  .header{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--accent);}
  .back{font-size:12px;color:var(--muted);text-decoration:none;margin-left:auto;border:1px solid var(--border);padding:4px 10px;border-radius:4px;}
  .back:hover{color:var(--text);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;}
  .field input:focus{outline:none;border-color:var(--accent);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;margin-top:4px;}
  .btn-primary{background:var(--purple);color:#fff;}
  .btn-primary:hover{opacity:0.9;}
  .btn-success{background:var(--green);color:#fff;}
  .btn-success:hover{opacity:0.9;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-danger:hover{opacity:0.9;}
  .btn-claude{background:var(--orange);color:#fff;}
  .btn-claude:hover{opacity:0.9;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.5px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .toast.ok{border-color:var(--green);color:var(--green);}
  .toast.err{border-color:var(--red);color:var(--red);}
  .date-display{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--accent);margin-bottom:4px;}
  .history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .history-row:last-child{border-bottom:none;}
  .history-date{color:var(--muted);}
  .history-gs{color:var(--purple);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;}
  .history-result{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;}
  .over{color:var(--green);}
  .under{color:var(--blue);}
  .pending{color:var(--muted);font-style:italic;}
  #lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;}
  #lock-screen h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--accent);}
  #pin-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:24px;text-align:center;width:160px;letter-spacing:8px;}
  #pin-input:focus{outline:none;border-color:var(--accent);}
  #pin-error{color:var(--red);font-size:13px;height:16px;}
  .export-progress{display:flex;flex-direction:column;gap:4px;margin-top:10px;}
  .progress-item{font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;color:var(--muted);}
  .progress-item.done{color:var(--green);}
  .progress-item.fail{color:var(--red);}
  .progress-item.loading{color:var(--accent);}
  .export-status{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;min-height:16px;}
  #claude-output{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:monospace;font-size:10px;resize:none;margin-top:10px;display:none;}
  #copy-btn{display:none;background:var(--surface2);color:var(--text);border:1px solid var(--orange);margin-top:8px;}
</style>
</head>
<body>

<div id="lock-screen">
  <img src="logo.png" alt="The Grand Salami Tracker" style="height:50px;width:auto;margin-bottom:4px;">
  <input type="password" id="pin-input" placeholder="••••" maxlength="4" inputmode="numeric">
  <div id="pin-error"></div>
</div>

<div id="main-content" style="display:none;">
  <div class="header">
    <img src="logo.png" alt="The Grand Salami Tracker" style="height:40px;width:auto;">
    <a href="/" class="back">← Tracker</a>
  </div>

  <!-- Today's Date -->
  <div class="card">
    <div class="card-title">Today's Slate</div>
    <div class="date-display" id="today-date">—</div>
    <div style="font-size:11px;color:var(--muted);" id="today-status">Loading...</div>
  </div>

  <!-- Export for Claude -->
  <div class="card" style="border-color:rgba(255,140,0,0.3);">
    <div class="card-title" style="color:var(--orange);">⚡ Export for Claude</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Fetches all slate data — odds, lines, starters, bullpen, history — and copies to clipboard ready to paste into Claude.</div>
    <button class="btn btn-claude" id="export-btn" onclick="exportForClaude()">EXPORT ALL DATA → CLAUDE</button>
    <div class="export-progress" id="export-progress"></div>
    <div class="export-status" id="export-status"></div>
    <textarea id="claude-output" rows="6" readonly></textarea>
    <button class="btn" id="copy-btn" onclick="copyOutput()">📋 COPY TO CLIPBOARD</button>
  </div>

  <!-- Grand Salami -->
  <div class="card">
    <div class="card-title">Set Grand Salami Line</div>
    <div class="field">
      <label>Grand Salami Line</label>
      <input type="number" id="gs-line" placeholder="e.g. 104" step="0.5">
    </div>
    <div class="row2">
      <div class="field">
        <label>Over Price</label>
        <input type="number" id="gs-over" placeholder="-110">
      </div>
      <div class="field">
        <label>Under Price</label>
        <input type="number" id="gs-under" placeholder="-110">
      </div>
    </div>
    <div class="field">
      <label>Book</label>
      <input type="text" id="gs-book" placeholder="DraftKings" value="DraftKings">
    </div>
    <div class="field" style="margin-top:10px;">
      <label>Units Played</label>
      <input type="number" id="gs-units" placeholder="e.g. 1" step="0.5" min="0" max="10">
    </div>
    <button class="btn btn-primary" onclick="saveGrandSalami()">SAVE GRAND SALAMI</button>
  </div>

  <!-- Today's Pick -->
  <div class="card">
    <div class="card-title">Today's Pick</div>
    <div class="row2">
      <button id="pick-over-btn" class="btn" style="background:rgba(0,196,106,0.15);color:#00C46A;border:1px solid #00C46A;" onclick="savePick('OVER')">⬆ OVER</button>
      <button id="pick-under-btn" class="btn" style="background:rgba(43,127,255,0.15);color:#2B7FFF;border:1px solid #2B7FFF;" onclick="savePick('UNDER')">⬇ UNDER</button>
    </div>
    <div id="pick-status" style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;">No pick set</div>
  </div>

  <!-- End of Day Result -->
  <div class="card">
    <div class="card-title">Save End of Day Result</div>
    <div class="row2" style="margin-bottom:10px;">
      <button id="date-today-btn" class="btn" style="background:rgba(176,106,255,0.2);color:#B06AFF;border:1px solid #B06AFF;" onclick="setResultDate('today')">Today</button>
      <button id="date-yest-btn" class="btn" style="background:transparent;color:var(--muted);border:1px solid var(--border);" onclick="setResultDate('yesterday')">Yesterday</button>
    </div>
    <div id="result-date-display" style="font-size:11px;color:var(--muted);margin-bottom:10px;text-align:center;"></div>
    <div class="row2">
      <div class="field">
        <label>Actual Runs</label>
        <input type="number" id="actual-runs" placeholder="e.g. 128">
      </div>
      <div class="field">
        <label>Result</label>
        <input type="text" id="result" placeholder="over / under">
      </div>
    </div>
    <button class="btn btn-success" onclick="saveResult()">SAVE RESULT</button>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title">Recent History</div>
    <div id="history-list"><div style="color:var(--muted);font-size:13px;">Loading...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const PIN = '1234'; // Change this to your preferred PIN

function checkPin() {
  const input = document.getElementById('pin-input').value;
  if (input === PIN) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    init();
  } else if (input.length === 4) {
    document.getElementById('pin-error').textContent = 'Incorrect PIN';
    document.getElementById('pin-input').value = '';
  }
}

document.getElementById('pin-input').addEventListener('input', checkPin);

function getTodayPDT() {
  const pst = new Date(Date.now() + -7 * 60 * 60000);
  return pst.toISOString().split('T')[0];
}

function getYesterdayPDT() {
  const pst = new Date(Date.now() + -7 * 60 * 60000 - 86400000);
  return pst.toISOString().split('T')[0];
}

function getPDTDate(offsetDays) {
  const d = new Date(Date.now() + (-7 * 60 * 60000) + (offsetDays * 86400000));
  return d.toISOString().split('T')[0];
}

let resultDate = getTodayPDT();

function setResultDate(which) {
  resultDate = which === 'yesterday' ? getYesterdayPDT() : getTodayPDT();
  document.getElementById('result-date-display').textContent = `Saving for: ${resultDate}`;
  document.getElementById('date-today-btn').style.background = which === 'today' ? 'rgba(176,106,255,0.2)' : 'transparent';
  document.getElementById('date-today-btn').style.color = which === 'today' ? '#B06AFF' : 'var(--muted)';
  document.getElementById('date-today-btn').style.border = which === 'today' ? '1px solid #B06AFF' : '1px solid var(--border)';
  document.getElementById('date-yest-btn').style.background = which === 'yesterday' ? 'rgba(176,106,255,0.2)' : 'transparent';
  document.getElementById('date-yest-btn').style.color = which === 'yesterday' ? '#B06AFF' : 'var(--muted)';
  document.getElementById('date-yest-btn').style.border = which === 'yesterday' ? '1px solid #B06AFF' : '1px solid var(--border)';
  document.getElementById('actual-runs').value = '';
  document.getElementById('result').value = '';
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}

// ── EXPORT FOR CLAUDE ─────────────────────────────────────────────────────────

function setProgress(id, label, state) {
  let el = document.getElementById('prog-' + id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'prog-' + id;
    document.getElementById('export-progress').appendChild(el);
  }
  el.className = 'progress-item ' + state;
  const icons = { loading: '⏳', done: '✓', fail: '✗' };
  el.textContent = `${icons[state] || ''} ${label}`;
}

function ipToOuts(ip) {
  const s = String(ip || '0');
  const [inn, outs] = s.split('.').map(Number);
  return (inn || 0) * 3 + (outs || 0);
}

function outsToIp(outs) {
  return `${Math.floor(outs / 3)}.${outs % 3}`;
}

async function fetchBullpenData(dates) {
  const weights = [0.70, 0.18, 0.12];
  const dayResults = await Promise.all(dates.map(async (dateStr) => {
    try {
      const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}&hydrate=linescore`);
      const data = await res.json();
      const games = data.dates?.[0]?.games || [];
      const teamData = {};
      for (const game of games) {
        if (game.status.detailedState !== 'Final') continue;
        try {
          const boxRes = await fetch(`https://statsapi.mlb.com/api/v1/game/${game.gamePk}/boxscore`);
          const box = await boxRes.json();
          for (const side of ['home', 'away']) {
            const team = box.teams[side];
            const abbr = team.team.abbreviation;
            const pitchers = (team.pitchers || []).map(id => team.players[`ID${id}`]);
            const bullpen = pitchers.slice(1);
            const bullpenOuts = bullpen.reduce((s, p) => s + ipToOuts(p?.stats?.pitching?.inningsPitched || 0), 0);
            if (!teamData[abbr]) teamData[abbr] = { abbr, name: team.team.name, outs: 0 };
            teamData[abbr].outs += bullpenOuts;
          }
        } catch(e) { /* skip game */ }
      }
      return teamData;
    } catch(e) { return {}; }
  }));

  const allTeams = new Set(dayResults.flatMap(d => Object.keys(d)));
  const results = [];
  for (const abbr of allTeams) {
    const dayOuts = dayResults.map(d => d[abbr]?.outs || 0);
    const weighted = dayOuts.reduce((s, o, i) => s + o * weights[i], 0);
    const weightedIp = parseFloat((Math.floor(weighted / 3) + (weighted % 3) / 10).toFixed(1));
    let tier;
    if (weighted >= 12) tier = 'GASSED';
    else if (weighted >= 9) tier = 'TAXED';
    else tier = 'FRESH';
    results.push({ abbr, weightedIp, tier, dayIp: dayOuts.map(outsToIp) });
  }
  results.sort((a, b) => b.weightedIp - a.weightedIp);
  return results;
}

async function exportForClaude() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'FETCHING...';
  document.getElementById('export-progress').innerHTML = '';
  document.getElementById('export-status').textContent = '';
  document.getElementById('claude-output').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';

  const today = getTodayPDT();
  const bpDates = [getPDTDate(-1), getPDTDate(-2), getPDTDate(-3)];

  let oddsData = null, historyData = null, startersData = null, bullpenData = null, scheduleData = null;

  // 1. Odds + GS line
  setProgress('odds', 'Odds + GS line...', 'loading');
  try {
    const r = await fetch('/api/odds');
    oddsData = await r.json();
    setProgress('odds', `Odds — ${(oddsData.games || []).length} games loaded`, 'done');
  } catch(e) { setProgress('odds', 'Odds — failed', 'fail'); }

  // 2. History
  setProgress('history', 'History...', 'loading');
  try {
    const r = await fetch('/api/history');
    historyData = await r.json();
    setProgress('history', `History — ${historyData.length} records`, 'done');
  } catch(e) { setProgress('history', 'History — failed', 'fail'); }

  // 3. Probable starters + schedule from MLB Stats API
  setProgress('starters', 'Probable starters (MLB API)...', 'loading');
  try {
    const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=probablePitcher(note,stats(group=[pitching],type=[season])),linescore`);
    scheduleData = await r.json();
    const games = scheduleData.dates?.[0]?.games || [];
    const starters = [];
    for (const g of games) {
      for (const side of ['away', 'home']) {
        const p = g.teams[side].probablePitcher;
        if (p) {
          const s = p.stats?.find(st => st.type?.displayName === 'statsSingleSeason')?.stats || {};
          starters.push({
            name: p.fullName,
            team: g.teams[side].team.abbreviation,
            opponent: g.teams[side === 'away' ? 'home' : 'away'].team.abbreviation,
            side,
            era: s.era || '—',
            whip: s.whip || '—',
            ip: s.inningsPitched || '—',
            k9: s.strikeoutsPer9Inn || '—',
            wins: s.wins || 0,
            losses: s.losses || 0,
          });
        }
      }
    }
    startersData = starters;
    setProgress('starters', `Starters — ${starters.length} pitchers`, 'done');
  } catch(e) { setProgress('starters', 'Starters — failed', 'fail'); }

  // 4. Bullpen (last 3 days)
  setProgress('bullpen', 'Bullpen usage (3 days)...', 'loading');
  try {
    bullpenData = await fetchBullpenData(bpDates);
    setProgress('bullpen', `Bullpen — ${bullpenData.length} teams`, 'done');
  } catch(e) { setProgress('bullpen', 'Bullpen — failed', 'fail'); }

  // ── BUILD TEXT OUTPUT ───────────────────────────────────────────────────────
  const lines = [];
  const todayRec = historyData?.find(r => r.date === today) || {};
  const pregameLines = todayRec.pregameLines || {};
  const schedGames = scheduleData?.dates?.[0]?.games || [];

  lines.push(`=== GST MORNING EXPORT — ${today} ===`);
  lines.push(`Generated: ${new Date().toLocaleTimeString()}`);
  lines.push('');

  // Today summary
  lines.push('--- TODAY\'S RECORD ---');
  lines.push(`Date: ${today}`);
  lines.push(`Games on Slate: ${todayRec.gamesOnSlate || schedGames.length || (oddsData?.games?.length) || '?'}`);
  lines.push(`Naive Total (line sum): ${todayRec.naiveTotal || '?'}`);
  lines.push(`Grand Salami Line: ${todayRec.grandSalamLine || 'NOT SET'}`);
  if (todayRec.grandSalamLine) {
    lines.push(`GS Over Price: ${todayRec.gsOverPrice || '?'}`);
    lines.push(`GS Under Price: ${todayRec.gsUnderPrice || '?'}`);
    lines.push(`GS Book: ${todayRec.gsBook || '?'}`);
  }
  lines.push(`Today's Pick: ${todayRec.todayPick || 'NONE'}`);
  lines.push(`Units: ${todayRec.units != null ? todayRec.units : '?'}`);
  lines.push('');

  // Build odds lookup keyed by last word of team name (lowercase) for matching
  const oddsLookup = {};
  for (const g of (oddsData?.games || [])) {
    const hk = g.home_team.split(' ').pop().toLowerCase();
    const ak = g.away_team.split(' ').pop().toLowerCase();
    const key = `${ak}-${hk}`;
    const bk = (g.bookmakers || []).find(b => b.key === 'draftkings') || (g.bookmakers || [])[0];
    const mkt = bk?.markets?.find(m => m.key === 'totals');
    const ov = mkt?.outcomes?.find(o => o.name === 'Over');
    const un = mkt?.outcomes?.find(o => o.name === 'Under');
    if (ov) oddsLookup[key] = { line: ov.point, overPrice: ov.price, underPrice: un?.price, book: bk.title };
  }

  // Game lines — drive off schedGames for proper abbreviations, cross-ref oddsLookup
  lines.push('--- GAME LINES (DraftKings) ---');
  if (schedGames.length) {
    for (const g of schedGames) {
      const away = g.teams.away.team.abbreviation;
      const home = g.teams.home.team.abbreviation;
      const awayName = g.teams.away.team.name || '';
      const homeName = g.teams.home.team.name || '';
      const ak = awayName.split(' ').pop().toLowerCase();
      const hk = homeName.split(' ').pop().toLowerCase();
      const oddsKey = `${ak}-${hk}`;
      const pl = pregameLines[oddsKey];
      const od = oddsLookup[oddsKey];
      const lineStr = od
        ? `O/U ${od.line} (O${od.overPrice > 0 ? '+' : ''}${od.overPrice} / U${od.underPrice > 0 ? '+' : ''}${od.underPrice})`
        : (pl ? `O/U ${pl.line} (pregame)` : 'no line');
      const openStr = pl && od && od.line !== pl.line ? ` | Open: ${pl.line}` : (pl && !od ? '' : (pl ? ` | Open: ${pl.line}` : ''));
      lines.push(`${away} @ ${home}: ${lineStr}${openStr}`);
    }
  } else if (Object.keys(pregameLines).length) {
    lines.push('(No schedule data — using pregame lines from blob)');
    for (const [key, val] of Object.entries(pregameLines)) {
      lines.push(`${key}: O/U ${val.line} (O${val.overPrice} / U${val.underPrice})`);
    }
  } else {
    lines.push('No lines available');
  }
  lines.push('');

  // Starters — drive off schedGames, match startersData by team abbreviation
  lines.push('--- PROBABLE STARTERS (2026 Season Stats) ---');
  if (schedGames.length) {
    for (const g of schedGames) {
      const away = g.teams.away.team.abbreviation;
      const home = g.teams.home.team.abbreviation;
      // Get probable pitcher directly from schedule response (most reliable)
      const awayProb = g.teams.away.probablePitcher;
      const homeProb = g.teams.home.probablePitcher;
      // Also check startersData as fallback
      const awayP = startersData?.find(s => s.team === away && s.side === 'away');
      const homeP = startersData?.find(s => s.team === home && s.side === 'home');
      lines.push(`${away} @ ${home}:`);
      if (awayP) lines.push(`  ${away}: ${awayP.name} | ERA ${awayP.era} | WHIP ${awayP.whip} | IP ${awayP.ip} | K/9 ${awayP.k9} | ${awayP.wins}-${awayP.losses}`);
      else if (awayProb) lines.push(`  ${away}: ${awayProb.fullName} | (no season stats yet)`);
      else lines.push(`  ${away}: TBD`);
      if (homeP) lines.push(`  ${home}: ${homeP.name} | ERA ${homeP.era} | WHIP ${homeP.whip} | IP ${homeP.ip} | K/9 ${homeP.k9} | ${homeP.wins}-${homeP.losses}`);
      else if (homeProb) lines.push(`  ${home}: ${homeProb.fullName} | (no season stats yet)`);
      else lines.push(`  ${home}: TBD`);
    }
  } else {
    lines.push('Starters unavailable');
  }
  lines.push('');

  // Bullpen
  lines.push('--- BULLPEN FATIGUE (Weighted 3-Day) ---');
  lines.push(`Weights: 70% ${bpDates[0]} / 18% ${bpDates[1]} / 12% ${bpDates[2]}`);
  if (bullpenData?.length) {
    for (const b of bullpenData) {
      lines.push(`${b.abbr}: ${b.weightedIp} IP — ${b.tier} | Days: ${b.dayIp.join(' / ')}`);
    }
  } else {
    lines.push('Bullpen data unavailable');
  }
  lines.push('');

  // History (last 10)
  lines.push('--- RECENT HISTORY (Last 10) ---');
  const recent = (historyData || []).slice(0, 10);
  if (recent.length) {
    for (const r of recent) {
      const rawGap = r.actualRuns != null && r.grandSalamLine ? r.actualRuns - r.grandSalamLine : null;
      const gap = rawGap !== null ? (rawGap > 0 ? '+' : '') + rawGap.toFixed(1) : '?';
      lines.push(`${r.date}: GS ${r.grandSalamLine || '?'} | Naive ${r.naiveTotal || '?'} | Actual ${r.actualRuns ?? '?'} | Gap ${gap} | ${(r.result || 'pending').toUpperCase()} | Pick: ${r.todayPick || '-'} | Units: ${r.units != null ? r.units : '-'}`);
    }
  } else {
    lines.push('No history yet');
  }
  lines.push('');
  lines.push('=== END EXPORT ===');

  const output = lines.join('\n');
  document.getElementById('claude-output').value = output;
  document.getElementById('claude-output').style.display = 'block';
  document.getElementById('copy-btn').style.display = 'block';

  // Auto-copy
  try {
    await navigator.clipboard.writeText(output);
    document.getElementById('export-status').textContent = '✓ Copied to clipboard — paste into Claude';
    document.getElementById('export-status').style.color = 'var(--green)';
    showToast('Copied! Paste into Claude ✓', 'ok');
  } catch(e) {
    document.getElementById('export-status').textContent = 'Auto-copy failed — tap Copy button below';
    document.getElementById('export-status').style.color = 'var(--muted)';
  }

  btn.disabled = false;
  btn.textContent = 'EXPORT ALL DATA → CLAUDE';
}

async function copyOutput() {
  const text = document.getElementById('claude-output').value;
  try {
    await navigator.clipboard.writeText(text);
    showToast('Copied ✓', 'ok');
  } catch(e) {
    document.getElementById('claude-output').select();
    document.execCommand('copy');
    showToast('Copied ✓', 'ok');
  }
}

// ── EXISTING FUNCTIONS ────────────────────────────────────────────────────────

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    const history = await res.json();
    const today = getTodayPDT();
    const todayRecord = history.find(r => r.date === today);

    if (todayRecord) {
      const status = [];
      if (todayRecord.grandSalamLine) status.push(`GS: ${todayRecord.grandSalamLine}`);
      if (todayRecord.gamesOnSlate) status.push(`${todayRecord.gamesOnSlate} games`);
      if (todayRecord.naiveTotal) status.push(`Naive: ${todayRecord.naiveTotal}`);
      document.getElementById('today-status').textContent = status.join(' · ') || 'No data yet';

      if (todayRecord.grandSalamLine) {
        document.getElementById('gs-line').value = todayRecord.grandSalamLine;
        document.getElementById('gs-over').value = todayRecord.gsOverPrice || '';
        document.getElementById('gs-under').value = todayRecord.gsUnderPrice || '';
        document.getElementById('gs-book').value = todayRecord.gsBook || 'DraftKings';
      }
      if (todayRecord.units != null) {
        document.getElementById('gs-units').value = todayRecord.units;
      }
      if (todayRecord.todayPick) {
        document.getElementById('pick-status').textContent = `Pick set: ${todayRecord.todayPick}`;
        document.getElementById('pick-status').style.color = todayRecord.todayPick === 'OVER' ? '#00C46A' : '#2B7FFF';
      }
      if (todayRecord.actualRuns) {
        document.getElementById('actual-runs').value = todayRecord.actualRuns;
        document.getElementById('result').value = todayRecord.result || '';
      }
    } else {
      document.getElementById('today-status').textContent = 'No record yet — odds fetch will create one';
    }

    const recent = history.slice(0, 7);
    document.getElementById('history-list').innerHTML = recent.map(r => {
      const resCls = r.result === 'over' ? 'over' : r.result === 'under' ? 'under' : 'pending';
      const resLbl = r.result ? r.result.toUpperCase() : 'Pending';
      return `<div class="history-row">
        <span class="history-date">${r.date}</span>
        <span class="history-gs">${r.grandSalamLine || '—'}</span>
        <span style="color:var(--muted);font-size:12px;">${r.actualRuns != null ? r.actualRuns + ' runs' : '—'}</span>
        <span class="history-result ${resCls}">${resLbl}</span>
      </div>`;
    }).join('') || '<div style="color:var(--muted);font-size:13px;">No history yet</div>';
  } catch(e) {
    document.getElementById('today-status').textContent = 'Error loading data';
    console.error(e);
  }
}

async function savePick(pick) {
  try {
    const res = await fetch('/api/odds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: getTodayPDT(), todayPick: pick })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('pick-status').textContent = `Pick set: ${pick}`;
      document.getElementById('pick-status').style.color = pick === 'OVER' ? '#00C46A' : '#2B7FFF';
      showToast(`Pick: ${pick} saved ✓`, 'ok');
      loadHistory();
    }
  } catch(e) { showToast('Error: ' + e.message, 'err'); }
}

async function saveGrandSalami() {
  const line = parseFloat(document.getElementById('gs-line').value);
  const over = parseInt(document.getElementById('gs-over').value);
  const under = parseInt(document.getElementById('gs-under').value);
  const book = document.getElementById('gs-book').value || 'DraftKings';

  if (!line) { showToast('Enter a line first', 'err'); return; }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = 'SAVING...';

  try {
    const res = await fetch('/api/odds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date: getTodayPDT(),
        grandSalamLine: line,
        gsOverPrice: over || -110,
        gsUnderPrice: under || -110,
        gsBook: book,
        units: parseFloat(document.getElementById('gs-units').value) || null
      })
    });
    const data = await res.json();
    if (data.ok) {
      showToast('Grand Salami saved ✓', 'ok');
      loadHistory();
    } else {
      showToast('Save failed', 'err');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'SAVE GRAND SALAMI';
  }
}

async function saveResult() {
  const runs = parseInt(document.getElementById('actual-runs').value);
  let result = document.getElementById('result').value.toLowerCase().trim();

  if (!runs) { showToast('Enter actual runs', 'err'); return; }
  if (!['over','under','push'].includes(result)) {
    const res = await fetch('/api/history');
    const history = await res.json();
    const record = history.find(r => r.date === resultDate);
    if (record && record.grandSalamLine) {
      result = runs > record.grandSalamLine ? 'over' : runs < record.grandSalamLine ? 'under' : 'push';
      document.getElementById('result').value = result;
    } else {
      showToast('Enter result: over/under/push', 'err');
      return;
    }
  }

  const btn = document.querySelector('.btn-success');
  btn.disabled = true;
  btn.textContent = 'SAVING...';

  try {
    const res = await fetch('/api/odds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: resultDate, actualRuns: runs, result })
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`${runs} runs · ${result.toUpperCase()} saved for ${resultDate} ✓`, 'ok');
      loadHistory();
    } else {
      showToast('Save failed', 'err');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'SAVE RESULT';
  }
}

function init() {
  document.getElementById('today-date').textContent = getTodayPDT();
  document.getElementById('result-date-display').textContent = `Saving for: ${resultDate}`;
  loadHistory();
}
</script>
